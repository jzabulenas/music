<form [formGroup]="form" (ngSubmit)="submit()">
  <mat-form-field appearance="outline">
    <mat-label>Artist name</mat-label>
    <input matInput type="text" formControlName="name" autocomplete="off" />

    @if (nameControl.hasError('required') && nameControl.touched) {
      <mat-error>Artist name is required</mat-error>
    } @else if (nameControl.hasError('maxlength') && nameControl.touched) {
      <mat-error>Name must be 255 characters or fewer</mat-error>
    }
  </mat-form-field>

  <button mat-flat-button type="submit">Add</button>
</form>
