<mat-card>
  <mat-card-header>
    <mat-card-title>{{ recommendation().name }}</mat-card-title>

    @if (recommendation().genre) {
      <mat-card-subtitle>{{ recommendation().genre }}</mat-card-subtitle>
    }
  </mat-card-header>

  @if (recommendation().reason) {
    <mat-card-content>
      <p>{{ recommendation().reason }}</p>
    </mat-card-content>
  }

  <mat-card-actions>
    <button mat-button [disabled]="isSaved()" (click)="onSave()">
      {{ isSaved() ? 'Saved' : 'Save for later' }}
    </button>
  </mat-card-actions>
</mat-card>
