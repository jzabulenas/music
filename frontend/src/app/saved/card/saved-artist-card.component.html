<mat-card>
  <mat-card-header>
    <mat-card-title>{{ savedArtist().name }}</mat-card-title>

    @if (savedArtist().genre) {
      <mat-card-subtitle>{{ savedArtist().genre }}</mat-card-subtitle>
    }
  </mat-card-header>

  <mat-card-actions>
    <button mat-button (click)="onRemove()">Remove</button>
  </mat-card-actions>
</mat-card>
