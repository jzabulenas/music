<mat-card>
  <mat-card-header>
    <mat-card-title>Sign in</mat-card-title>
    @if (!confirmed()) {
      <mat-card-subtitle>We'll email you a magic link — no password needed</mat-card-subtitle>
    }
  </mat-card-header>

  <mat-card-content>
    @if (confirmed()) {
      <app-login-confirm />
    } @else {
      <app-login-form (submitted)="confirmed.set(true)" />
    }
  </mat-card-content>
</mat-card>
